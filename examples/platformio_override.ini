# Example WLED platformio_override.ini environments for the Power Manager usermod.
#
# These use `custom_usermods = power_manager` (a local copy in usermods/power_manager/).
# To build straight from GitHub instead, replace that line with:
#   custom_usermods = https://github.com/intermittech/WLED-PowerManager.git
# and remove the local copy. All POWER_MANAGER_* defines are documented in the README.

# Test/production build for power_manager usermod with AW9523 I2C port expander
[platformio]
default_envs = esp32dev_powermanager_aw9523

[env:esp32dev_powermanager_aw9523]
extends = env:esp32dev
custom_usermods = power_manager
build_flags = ${env:esp32dev.build_flags}
  -D USERMOD_USE_AW9523                  ;; use AW9523 expander by default
  -D AW9523_ADDRESS=0x58                 ;; AD1=AD0=GND (0x58-0x5B)
  -D POWER_MANAGER_MAX_RELAYS=8
  -D POWER_MANAGER_PINS=100,101,102,103,104,105,106,107   ;; P0_0..P0_7 on the AW9523
  -D POWER_MANAGER_EXTERNALS=true,true,true,true,true,true,true,true

# QuinLED Dig-Next-2 (ESP32-PICO-V3-02, 8MB flash + PSRAM)
# Adapted from intermittech/QuinLED-Firmware [env:dig-next-2] for this WLED 17.0.0-dev tree,
# plus segment-coupling usermod features and relay names per https://quinled.info/dig-next-2-pinout-guide/
# (dropped from upstream env: WLED_DISABLE_BLYNK & NOWIFISLEEP - removed in 17.x;
#  USERMOD_* enable defines & explicit lib_deps - superseded by custom_usermods;
#  WLED_REPO - intentionally unset so the built-in updater does not offer stock QuinLED images over this custom build)
[env:dig-next-2]
extends = env:esp32dev
upload_speed = 921600
custom_usermods = audioreactive power_manager sht
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0            ;; mandatory for classic ESP32 on arduino-esp32 >=2.0.3
  -D BOARD_HAS_PSRAM
  -D WLED_DISABLE_LOXONE
  -D WLED_PRODUCT_NAME="\"Dig-Next-2\""
  -D WLED_RELEASE_NAME="\"Dig-Next-2\""
  -D SERVERNAME="\"Dig-Next-2\""
  -D WLED_BRAND="\"QuinLED\""
  -D WLED_AUTOSEGMENTS                   ;; one segment per output by default (pairs with relay coupling)
  -D DATA_PINS="2,4"                     ;; LED1, LED2
  -D PIXEL_COUNTS="30,30"
  -D ABL_MILLIAMPS_DEFAULT=5000
  -D BTNPIN=34,35,-1,-1                  ;; Button_1, Button_2 (HW debounced, pulled high)
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D I2CSDAPIN=15
  -D I2CSCLPIN=14
  -D SR_DMTYPE=5                         ;; onboard I2S PDM microphone
  -D I2S_SDPIN=7
  -D I2S_WSPIN=8
  -D I2S_CKPIN=-1
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D I2S_USE_16BIT_SAMPLES
  -D POWER_MANAGER_MAX_RELAYS=4
  -D POWER_MANAGER_MASTER=true             ;; relay 0 (External Relay) = Master AC relay (PSU trigger)
  -D POWER_MANAGER_MASTER_MAIN_SYNC=true   ;; main power mirrors the Master AC relay
  -D POWER_MANAGER_PINS=5,20,21,22         ;; External Relay, 5A_1, 10A_1, 5A_2
  -D POWER_MANAGER_NAMES='"External Relay","5A_1","10A_1","5A_2"'  ;; names per Dig-Next-2 pinout guide
board_build.partitions = ${esp32.large_partitions}
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.flash_mode = dio
monitor_filters = esp32_exception_decoder

# QuinLED Dig-Next-4 (ESP32-PICO-MINI-02, 8MB flash + PSRAM)
# Pinout from schematic (2026-07-11): LED1-4 = GPIO 2/4/12/14, buttons 34/35/36/37,
# I2C SDA=13 SCL=15, PDM mic WS=5 SD=38. Power switching via onboard AW9523B @0x58
# (AD0=AD1=GND): P0_0..P0_5 = output MOSFETs, P0_6 = AC relay (PSU trigger).
# Ethernet: RMII MDC=7 MDIO=8 LAN8720 clock-in-GPIO0 = existing "QuinLED Dig-Uno/Quad v4" profile.
[env:dig-next-4]
extends = env:esp32dev
upload_speed = 921600
custom_usermods = audioreactive power_manager sht
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0            ;; mandatory for classic ESP32 on arduino-esp32 >=2.0.3
  -D BOARD_HAS_PSRAM
  -D WLED_DISABLE_LOXONE
  -D WLED_USE_ETHERNET
  -D WLED_ETH_DEFAULT=WLED_ETH_QUINLED_V4_UNOQUAD   ;; MDC=7, MDIO=8, LAN8720, clock in on GPIO0
  -D WLED_PRODUCT_NAME="\"Dig-Next-4\""
  -D WLED_RELEASE_NAME="\"Dig-Next-4\""
  -D SERVERNAME="\"Dig-Next-4\""
  -D WLED_BRAND="\"QuinLED\""
  -D WLED_AUTOSEGMENTS                   ;; one segment per output by default (pairs with relay coupling)
  -D DATA_PINS="2,4,12,14"               ;; LED1..LED4
  -D PIXEL_COUNTS="30,30,30,30"
  -D ABL_MILLIAMPS_DEFAULT=5000
  -D BTNPIN=34,35,36,37                  ;; Button_1..Button_4 (input-only pins, HW debounced)
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D I2CSDAPIN=13
  -D I2CSCLPIN=15
  -D SR_DMTYPE=5                         ;; onboard I2S PDM microphone
  -D I2S_SDPIN=38
  -D I2S_WSPIN=5
  -D I2S_CKPIN=-1
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D I2S_USE_16BIT_SAMPLES
  -D USERMOD_USE_AW9523                  ;; onboard AW9523B drives the power MOSFETs + AC relay
  -D AW9523_ADDRESS=0x58                 ;; AD0=AD1=GND
  -D POWER_MANAGER_MAX_RELAYS=7
  -D POWER_MANAGER_MASTER=true                        ;; relay 0 = Master AC relay (PSU trigger)
  -D POWER_MANAGER_MASTER_MAIN_SYNC=true              ;; main power mirrors the Master AC relay
  -D POWER_MANAGER_PINS=106,100,101,102,103,104,105   ;; P0_6 (AC relay), P0_0..P0_5 (output MOSFETs)
  -D POWER_MANAGER_NAMES='"AC Relay","5A_1","10A_1","5A_2","5A_3","10A_2","5A_4"'
  -D POWER_MANAGER_STABILIZE=2                        ;; PSU settle time after the AC relay closes
board_build.partitions = ${esp32.large_partitions}
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.flash_mode = dio
monitor_filters = esp32_exception_decoder
